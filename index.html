                                    );
                                })}
                            </tbody>
                        </table>
                    </TableScroll>
                    <div className="flex flex-col gap-3 border-t border-[#72503A]/10 bg-[#ebe4d4] px-4 py-3 sm:flex-row sm:items-center sm:justify-between sm:px-6">
                        <p className="font-label text-xs text-[#56423b] sm:text-sm">{copy.npl.tableFooter(NPL_SEGMENT_ROWS.length, NPL_CLUSTER_TOTAL)}</p>
                        <div className="flex items-center gap-1">
                            <button type="button" className="rounded px-2 py-1 text-sm text-[#72503A] hover:bg-black/5" aria-label="ก่อนหน้า">
                                ‹
                            </button>
                            {[1, 2, 3].map((p) => (
                                <button
                                    key={p}
                                    type="button"
                                    className={`min-w-[2rem] rounded px-2 py-1 text-sm font-semibold ${p === 1 ? 'bg-[#735c00] text-white' : 'text-[#72503A] hover:bg-black/5'}`}
                                >
                                    {p}
                                </button>
                            ))}
                            <button type="button" className="rounded px-2 py-1 text-sm text-[#72503A] hover:bg-black/5" aria-label="ถัดไป">
                                ›
                            </button>
                        </div>
                    </div>
                </section>

                <section className="grid grid-cols-1 gap-4 lg:grid-cols-2 lg:gap-6">
                    <div className="flex flex-col rounded-xl border border-[#3d2a22]/15 bg-[#F5F1E8] p-5 shadow-md sm:p-6">
                        <div className="mb-4 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                            <h3 className="font-headline text-lg font-bold text-[#2b160f] sm:text-xl">{copy.npl.historicalTitle}</h3>
                            <span className="inline-flex w-fit rounded border border-[#72503A]/25 bg-[#faf6ee] px-3 py-1 font-label text-[10px] font-bold uppercase tracking-wide text-[#56423b]">
                                {copy.npl.historicalRange}
                            </span>
                        </div>
                        <div className="relative min-h-[180px] flex-1">
                            <svg className="h-full w-full" viewBox="0 0 400 140" preserveAspectRatio="xMidYMid meet" aria-hidden>
                                <defs>
                                    <linearGradient id="nplAreaGradient" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="0%" stopColor="#b39016" stopOpacity="0.4" />
                                        <stop offset="100%" stopColor="#b39016" stopOpacity="0.02" />
                                    </linearGradient>
                                </defs>
                                <path
                                    fill="url(#nplAreaGradient)"
                                    d="M0,95 C50,88 60,102 100,78 S180,55 220,62 S300,40 340,48 S380,35 400,42 L400,140 L0,140 Z"
                                />
                                <path
                                    fill="none"
                                    stroke="#735c00"
                                    strokeWidth="2.5"
                                    d="M0,95 C50,88 60,102 100,78 S180,55 220,62 S300,40 340,48 S380,35 400,42"
                                />
                            </svg>
                            <div className="mt-1 flex justify-between px-1 font-label text-[10px] font-medium text-[#72503A] sm:text-xs">
                                {NPLChartMonths.map((m) => (
                                    <span key={m}>{m}</span>
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className="flex flex-col rounded-xl border border-[#3d2a22]/15 bg-[#F5F1E8] p-5 shadow-md sm:p-6">
                        <span className="material-symbols-outlined mb-3 text-2xl text-[#735c00]">description</span>
                        <h3 className="font-headline text-lg font-bold text-[#2b160f] sm:text-xl">{copy.npl.liquidityTitle}</h3>
                        <p className="mt-3 flex-1 font-label text-sm leading-relaxed text-[#56423b] sm:text-base">{copy.npl.liquidityBody}</p>
                        <button
                            type="button"
                            className="font-label mt-6 w-full rounded-sm border-2 border-[#4d3600] bg-[#faf6ee] py-3 text-xs font-bold uppercase tracking-wide text-[#2b160f] transition-colors hover:bg-[#f0e8d8] sm:text-sm"
                        >
                            {copy.npl.liquidityCta}
                        </button>
                    </div>
                </section>
            </DashboardLayout>
        );

        const App = () => {
            const location = useLocation();
            const [mobileNavOpen, setMobileNavOpen] = useState(false);
            const showSidebar = location.pathname !== '/';
            const closeMobileNav = () => setMobileNavOpen(false);

            return (
                <DashboardUIContext.Provider value={{ mobileNavOpen, setMobileNavOpen, closeMobileNav }}>
                    <div className="min-h-screen bg-surface">
                        {showSidebar && (
                            <React.Fragment>
                                <div
                                    className={`fixed inset-0 z-40 bg-black/50 transition-opacity lg:hidden ${mobileNavOpen ? 'opacity-100' : 'pointer-events-none opacity-0'}`}
                                    onClick={closeMobileNav}
                                    aria-hidden={!mobileNavOpen}
                                />
                                <Sidebar mobileOpen={mobileNavOpen} onClose={closeMobileNav} />
                            </React.Fragment>
                        )}
                        <Routes>
                            <Route path="/" element={<LoginPage />} />
                            <Route path="/market" element={<MarketPricePage />} />
                            <Route path="/crm" element={<CRMSegmentationPage />} />
                            <Route path="/credit" element={<CreditRiskPage />} />
                            <Route path="/npl" element={<NPLAnalyticsPage />} />
                        </Routes>
                    </div>
                </DashboardUIContext.Provider>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(
            <MemoryRouter>
                <App />
            </MemoryRouter>
        );
    </script>
</body>
</html>
